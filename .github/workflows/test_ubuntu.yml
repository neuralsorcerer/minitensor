name: Tests (Ubuntu)

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Python + Rust bindings)
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          python -m pip install -U "pip>=22.1.2"
          python -m pip install "maturin[patchelf]"
          maturin develop
          python -m pip install ".[dev]"

      - name: Run Rust tests
        shell: bash
        run: |
          cargo test --manifest-path engine/Cargo.toml
          cargo test --manifest-path bindings/Cargo.toml

      - name: Run Python tests
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pytest -v tests/

      # `maturin develop` and PEP 517 installs skip the auditwheel step, so a
      # broken [tool.maturin] compatibility setting can pass every test above
      # while `maturin build` release wheels fail (it happened: the "pypi"
      # value panicked maturin 1.14 and CI stayed green). Build one wheel per
      # run to keep the release path honest; debug profile reuses the target
      # dir, so this is cheap.
      - name: Build wheel (release-path guard)
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          maturin build --out /tmp/wheel-guard
          ls /tmp/wheel-guard/*.whl
