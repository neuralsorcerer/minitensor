name: Publish documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Build documentation
        env:
          SPHINX_HTML_BASEURL: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) || '' }}
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload documentation artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v5
